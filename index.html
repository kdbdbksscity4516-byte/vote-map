<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>영등포구 사전투표소 반경 100m 체크</title>
    <!-- 카카오맵 API -->
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=59607bc7645797fb02b59a58259a2af7&libraries=services"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; }
        #map { width: 100%; height: 100%; }
        #info-box {
            position: absolute; top: 10px; left: 10px; right: 10px; z-index: 10;
            background: rgba(255, 255, 255, 0.95); padding: 12px;
            border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); font-size: 13px; line-height: 1.5;
        }
        .danger-zone { color: #ff4d4d; font-weight: bold; }
        .my-loc-text { color: #e60000; font-weight: bold; }
    </style>
</head>
<body>

    <div id="info-box">
        🚨 <b>선거운동 금지구역 확인 (영등포구 전체)</b><br>
        • 지도 상의 <span class="danger-zone">빨간색 원(반경 100m)</span> 내부 : <b>선거운동 절대 금지</b><br>
        • <span class="my-loc-text">빨간색 마커</span>가 내 실시간 위치입니다. (이동 시 자동 갱신)
    </div>

    <div id="map"></div>

    <script>
        // 영등포구 18개 사전투표소 최종 주소 목록 (괄호 안 상세 행정구역 보정 완료)
        var votingStations = [
            { name: "영등포본동 사전투표소", address: "서울시 영등포구 신길로61길 17" },
            { name: "영등포동 사전투표소", address: "서울시 영등포구 양산로 232" },
            { name: "여의동 사전투표소", address: "서울시 영등포구 국제금융로 124" },
            { name: "당산제1동 사전투표소", address: "서울시 영등포구 국회대로 596" },
            { name: "당산제2동 사전투표소", address: "서울시 영등포구 당산로41가길 7" },
            { name: "도림동 사전투표소", address: "서울시 영등포구 도영로7길 10" },
            { name: "문래동 사전투표소", address: "서울시 영등포구 문래로28길 15" },
            { name: "양평제1동 사전투표소", address: "서울시 영등포구 선유서로34길 10" },
            { name: "양평제2동 사전투표소", address: "서울시 영등포구 선유로47길 30" },
            { name: "신길제1동 사전투표소", address: "서울시 영등포구 영등포로 84길 24-5" },
            { name: "신길제3동 사전투표소", address: "서울시 영등포구 가마산로 483" },
            { name: "신길제4동 사전투표소", address: "서울시 영등포구 신길로42길 1" },
            { name: "신길제5동 사전투표소", address: "서울시 영등포구 도림로 264" },
            { name: "신길제6동 사전투표소", address: "서울시 영등포구 대방천로 167" },
            { name: "신길제7동 사전투표소", address: "서울시 영등포구 여의대방로43길 10" },
            { name: "대림제1동 사전투표소", address: "서울시 영등포구 디지털로 441" },
            { name: "대림제2동 사전투표소", address: "서울시 영등포구 대림로23길 25" },
            { name: "대림제3동 사전투표소", address: "서울시 영등포구 도신로4길 20" }
        ];

        // 영등포구 중심부로 초기 화면 설정
        var mapContainer = document.getElementById('map'), 
            mapOption = { 
                center: new kakao.maps.LatLng(37.5172, 126.8920), 
                level: 6 // 18개 투표소가 어느 정도 시야에 들어오도록 확대 레벨 조정
            }; 

        var map = new kakao.maps.Map(mapContainer, mapOption); 
        var geocoder = new kakao.maps.services.Geocoder();
        var userMarker = null; 

        // 내 위치용 빨간색 마커 이미지 설정 (카카오 기본 빨간색 하트 마커)
        var imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/marker_red.png', 
            imageSize = new kakao.maps.Size(64, 69), 
            imageOption = {offset: new kakao.maps.Point(27, 69)}; 

        var markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize, imageOption);

        // 18개 사전투표소 순회하며 지도에 표시 및 반경 100m 빨간 원 그리기
        votingStations.forEach(function(station) {
            geocoder.addressSearch(station.address, function(result, status) {
                if (status === kakao.maps.services.Status.OK) {
                    var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                    
                    // 투표소 고정 마커 (기본 파란 핀)
                    var marker = new kakao.maps.Marker({ map: map, position: coords }); 
                    
                    // 투표소 이름 말풍선
                    var infowindow = new kakao.maps.InfoWindow({
                        content: '<div style="padding:5px;font-size:11px;text-align:center;font-weight:bold;color:#333;width:130px;">' + station.name + '</div>'
                    });
                    infowindow.open(map, marker);
                    
                    // 투표소 기준 반경 100m 금지구역 원 생성
                    var circle = new kakao.maps.Circle({
                        center: coords, radius: 100, strokeWeight: 2, strokeColor: '#ff4d4d',
                        strokeOpacity: 0.8, strokeStyle: 'solid', fillColor: '#ff4d4d', fillOpacity: 0.15
                    });
                    circle.setMap(map);
                }
            });
        });

        // 실시간 운동원 GPS 위치 추적 및 빨간색 마커 매핑
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(position) {
                var lat = position.coords.latitude;
                var lon = position.coords.longitude;
                var locPosition = new kakao.maps.LatLng(lat, lon);

                if (userMarker) {
                    userMarker.setPosition(locPosition);
                } else {
                    userMarker = new kakao.maps.Marker({ 
                        map: map, 
                        position: locPosition,
                        image: markerImage // 내 위치만 빨간색 마커 적용
                    });
                    map.setCenter(locPosition); // 앱 처음 켤 때 내 위치 중심 고정
                }
            }, function(error) {
                console.error("위치 추적 실패:", error);
            }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
        } else {
            alert("이 브라우저에서는 GPS 위치 서비스를 지원하지 않습니다.");
        }
    </script>
</body>
</html>
